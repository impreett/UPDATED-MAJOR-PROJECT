<div class="public-page-shell">
  <header class="d-flex align-items-center justify-content-center p-3" style="background-color: #000; color: white">
    <img src="/assets/logo.png" alt="Logo" class="public-header-logo" />
    <h1>Police Case Management</h1>
  </header>

  <div class="public-page-content register-page-content">
    <div class="container py-5">
      <h2 class="text-center mb-4">Create Account</h2>

      <div class="col-md-10 col-lg-8 mx-auto">
        <div class="card shadow register-form-card">
          <div class="card-body p-4 p-md-5">
            <div
              class="mb-4 sort-tabs role-toggle"
              role="group"
              aria-label="Select registration type"
              [class.is-latest]="selectedRole === 'inspector'"
              [class.is-oldest]="selectedRole === 'citizen'"
            >
              <button
                type="button"
                class="sort-btn"
                [class.active]="selectedRole === 'inspector'"
                (click)="setRole('inspector')"
              >
                <span class="neu-text" aria-hidden="true">
                  <span class="neu-text-primary">
                    <span>P</span><span>o</span><span>l</span><span>i</span><span>c</span><span>e</span><span>&nbsp;</span><span>R</span><span>e</span><span>g</span><span>i</span><span>s</span><span>t</span><span>r</span><span>a</span><span>t</span><span>i</span><span>o</span><span>n</span>
                  </span>
                  <span class="neu-text-secondary">
                    <span>P</span><span>o</span><span>l</span><span>i</span><span>c</span><span>e</span><span>&nbsp;</span><span>R</span><span>e</span><span>g</span><span>i</span><span>s</span><span>t</span><span>r</span><span>a</span><span>t</span><span>i</span><span>o</span><span>n</span>
                  </span>
                </span>
                <span class="visually-hidden">Police Registration</span>
              </button>
              <button
                type="button"
                class="sort-btn"
                [class.active]="selectedRole === 'citizen'"
                (click)="setRole('citizen')"
              >
                <span class="neu-text" aria-hidden="true">
                  <span class="neu-text-primary">
                    <span>C</span><span>i</span><span>t</span><span>i</span><span>z</span><span>e</span><span>n</span><span>&nbsp;</span><span>R</span><span>e</span><span>g</span><span>i</span><span>s</span><span>t</span><span>r</span><span>a</span><span>t</span><span>i</span><span>o</span><span>n</span>
                  </span>
                  <span class="neu-text-secondary">
                    <span>C</span><span>i</span><span>t</span><span>i</span><span>z</span><span>e</span><span>n</span><span>&nbsp;</span><span>R</span><span>e</span><span>g</span><span>i</span><span>s</span><span>t</span><span>r</span><span>a</span><span>t</span><span>i</span><span>o</span><span>n</span>
                  </span>
                </span>
                <span class="visually-hidden">Citizen Registration</span>
              </button>
            </div>

            <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" novalidate>
              <input type="hidden" formControlName="role_type" />

              <ng-container *ngIf="selectedRole === 'inspector'; else citizenFields">
                <div class="mb-3">
                  <label class="form-label required">Inspector Full Name</label>
                  <input type="text" class="form-control" formControlName="fullname" />
                  <label *ngIf="errors.fullname" class="error">{{ errors.fullname }}</label>
                </div>

                <div class="mb-3">
                  <label class="form-label required">Badge ID</label>
                  <input type="text" class="form-control" formControlName="police_id" />
                  <label *ngIf="errors.police_id" class="error">{{ errors.police_id }}</label>
                </div>
              </ng-container>

              <ng-template #citizenFields>
                <div class="row g-3">
                  <div class="col-md-6">
                    <label class="form-label required">First Name</label>
                    <input type="text" class="form-control" formControlName="first_name" />
                    <label *ngIf="errors.first_name" class="error">{{ errors.first_name }}</label>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label required">Last Name</label>
                    <input type="text" class="form-control" formControlName="last_name" />
                    <label *ngIf="errors.last_name" class="error">{{ errors.last_name }}</label>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label required">Age</label>
                    <input type="number" min="18" max="110" class="form-control" formControlName="age" />
                    <label *ngIf="errors.age" class="error">{{ errors.age }}</label>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label required">Aadhar card number</label>
                    <input type="text" class="form-control" formControlName="aadhar_number" />
                    <label *ngIf="errors.aadhar_number" class="error">{{ errors.aadhar_number }}</label>
                  </div>
                </div>
              </ng-template>

              <div class="mb-3 mt-3">
                <label class="form-label required">Email</label>
                <input type="email" class="form-control" formControlName="email" />
                <label *ngIf="errors.email" class="error">{{ errors.email }}</label>
              </div>

              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label required">Mobile Number</label>
                  <input type="text" class="form-control" formControlName="contact" />
                  <label *ngIf="errors.contact" class="error">{{ errors.contact }}</label>
                </div>
                <div class="col-md-6">
                  <label class="form-label required">City</label>
                  <select class="form-select" formControlName="city">
                    <option value="">Select city</option>
                    <option *ngFor="let city of cityOptions" [value]="city">{{ city }}</option>
                  </select>
                  <label *ngIf="errors.city" class="error">{{ errors.city }}</label>
                </div>
              </div>

              <div class="row g-3 mt-1">
                <div class="col-md-6">
                  <label class="form-label required">Password</label>
                  <div class="password-toggle">
                    <input
                      [type]="showPassword ? 'text' : 'password'"
                      class="form-control"
                      formControlName="password"
                    />
                    <button
                      type="button"
                      class="password-toggle-btn"
                      [class.is-active]="showPassword"
                      (click)="togglePasswordVisibility()"
                      [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
                    >
                      <svg class="password-toggle-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path class="icon-eye-off" d="M9.88 9.88a3 3 0 1 0 4.24 4.24" />
                        <path class="icon-eye-off" d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68" />
                        <path class="icon-eye-off" d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61" />
                        <line class="icon-eye-off" x1="2" x2="22" y1="2" y2="22" />
                        <path class="icon-eye-on" d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
                        <circle class="icon-eye-on" cx="12" cy="12" r="3" />
                      </svg>
                    </button>
                  </div>
                  <label *ngIf="errors.password" class="error">{{ errors.password }}</label>
                </div>
                <div class="col-md-6">
                  <label class="form-label required">Confirm Password</label>
                  <div class="password-toggle">
                    <input
                      [type]="showConfirmPassword ? 'text' : 'password'"
                      class="form-control"
                      formControlName="conf_password"
                    />
                    <button
                      type="button"
                      class="password-toggle-btn"
                      [class.is-active]="showConfirmPassword"
                      (click)="toggleConfirmPasswordVisibility()"
                      [attr.aria-label]="showConfirmPassword ? 'Hide password' : 'Show password'"
                    >
                      <svg class="password-toggle-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path class="icon-eye-off" d="M9.88 9.88a3 3 0 1 0 4.24 4.24" />
                        <path class="icon-eye-off" d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68" />
                        <path class="icon-eye-off" d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61" />
                        <line class="icon-eye-off" x1="2" x2="22" y1="2" y2="22" />
                        <path class="icon-eye-on" d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
                        <circle class="icon-eye-on" cx="12" cy="12" r="3" />
                      </svg>
                    </button>
                  </div>
                  <label *ngIf="errors.conf_password" class="error">{{ errors.conf_password }}</label>
                </div>
              </div>

              <div class="form-check mt-3">
                <input id="term_of_use" class="form-check-input" type="checkbox" formControlName="term_of_use" />
                <label for="term_of_use" class="form-check-label required">
                  I accept the <a routerLink="/terms">Terms &amp; Conditions</a>.
                </label>
              </div>
              <label *ngIf="errors.term_of_use" class="error">{{ errors.term_of_use }}</label>

              <p class="mt-3 mb-0">Already have an account? <a routerLink="/login">Login here</a>.</p>

              <button
                type="submit"
                class="pending-action-btn pending-check-btn neu-button w-100 mt-3"
                [disabled]="loading"
              >
                <ng-container *ngIf="loading; else registerLabel">
                  <span class="span-mother" aria-hidden="true"><span>R</span><span>e</span><span>g</span><span>i</span><span>s</span><span>t</span><span>e</span><span>r</span><span>i</span><span>n</span><span>g</span><span>.</span><span>.</span><span>.</span></span>
                  <span class="span-mother2" aria-hidden="true"><span>R</span><span>e</span><span>g</span><span>i</span><span>s</span><span>t</span><span>e</span><span>r</span><span>i</span><span>n</span><span>g</span><span>.</span><span>.</span><span>.</span></span>
                  <span class="visually-hidden">Registering...</span>
                </ng-container>
                <ng-template #registerLabel>
                  <span class="span-mother" aria-hidden="true"><span>R</span><span>e</span><span>g</span><span>i</span><span>s</span><span>t</span><span>e</span><span>r</span></span>
                  <span class="span-mother2" aria-hidden="true"><span>R</span><span>e</span><span>g</span><span>i</span><span>s</span><span>t</span><span>e</span><span>r</span></span>
                  <span class="visually-hidden">Register</span>
                </ng-template>
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <app-footer></app-footer>
</div>
