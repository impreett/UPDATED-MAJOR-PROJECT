<div class="public-page-shell">
  <header
    class="d-flex align-items-center justify-content-center p-3"
    style="background-color: #000; color: white"
  >
    <img src="/assets/logo.png" alt="Logo" class="public-header-logo" />
    <h1>Police Case Management</h1>
  </header>
  <div class="public-page-content login-page-content">
    <div class="container py-5">
      <h2 class="text-center mb-4">User login</h2>
      <div class="col-md-8 col-lg-6 mx-auto">
        <div class="card login-form-card shadow glass-card">
          <div class="card-body p-4 p-md-5">
            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
              <div class="mb-3">
                <label class="form-label required">Email</label>
                <input
                  type="email"
                  formControlName="email"
                  class="form-control"
                  [class.is-invalid]="emailControl.invalid && (emailControl.touched || submitted)"
                  placeholder="Enter your email"
                />
                <div *ngIf="emailError" class="error">{{ emailError }}</div>
              </div>

              <div class="mb-3">
                <label class="form-label required">Password</label>
                <div class="password-toggle">
                  <input
                    [type]="showPassword ? 'text' : 'password'"
                    formControlName="password"
                    class="form-control"
                    [class.is-invalid]="passwordControl.invalid && (passwordControl.touched || submitted)"
                    placeholder="Enter your password"
                  />
                  <button
                    type="button"
                    class="password-toggle-btn"
                    [class.is-active]="showPassword"
                    (click)="showPassword = !showPassword"
                    [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
                  >
                    <svg class="password-toggle-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                      <path class="icon-eye-off" d="M9.88 9.88a3 3 0 1 0 4.24 4.24" />
                      <path class="icon-eye-off" d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68" />
                      <path class="icon-eye-off" d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61" />
                      <line class="icon-eye-off" x1="2" x2="22" y1="2" y2="22" />
                      <path class="icon-eye-on" d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
                      <circle class="icon-eye-on" cx="12" cy="12" r="3" />
                    </svg>
                  </button>
                </div>
                <div *ngIf="passwordError" class="error">{{ passwordError }}</div>
              </div>

              <div class="mb-3 remember-me-field">
                <label class="remember-me-label" for="rememberMe">
                  <input
                    id="rememberMe"
                    type="checkbox"
                    formControlName="rememberMe"
                    class="remember-me-checkbox"
                  />
                  <span>Remember me</span>
                </label>
              </div>

              <p>Don't have an account? <a routerLink="/register">Register here</a>.</p>
              <p><a href="/forgot-password" (click)="goToForgotPassword($event)">Forgot password?</a></p>
              <button
                type="submit"
                class="pending-action-btn pending-check-btn neu-button w-100 mt-3"
                [disabled]="loading"
              >
                <span aria-hidden="true" class="span-mother">
                  <span>L</span>
                  <span>o</span>
                  <span>g</span>
                  <span>i</span>
                  <span>n</span>
                </span>
                <span aria-hidden="true" class="span-mother2">
                  <span>L</span>
                  <span>o</span>
                  <span>g</span>
                  <span>i</span>
                  <span>n</span>
                </span>
                <span class="visually-hidden">Login</span>
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div
    *ngIf="errorMessage"
    class="remove-confirm-overlay"
    role="dialog"
    aria-modal="true"
    aria-labelledby="login-error-title"
    (click)="closeErrorMessage()"
  >
    <div class="remove-confirm-card pending-user-surface login-error-card" (click)="$event.stopPropagation()">
      <h5 id="login-error-title" class="mb-2">{{ errorTitle || "Login failed" }}</h5>
      <p class="mb-3">{{ errorMessage }}</p>
      <div class="remove-confirm-actions">
        <button
          type="button"
          class="pending-action-btn pending-check-btn neu-button"
          (click)="closeErrorMessage()"
        >
          <span aria-hidden="true" class="span-mother">
            <span>O</span>
            <span>K</span>
          </span>
          <span aria-hidden="true" class="span-mother2">
            <span>O</span>
            <span>K</span>
          </span>
          <span class="visually-hidden">OK</span>
        </button>
      </div>
    </div>
  </div>
  <app-footer></app-footer>
</div>
