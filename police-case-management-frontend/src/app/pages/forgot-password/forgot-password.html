<ng-container *ngIf="isEmbedded; else publicLayout">
  <div class="card-body p-4">
    <form [formGroup]="embeddedForm" (ngSubmit)="submitEmbeddedReset()">
      <p class="mb-3">Enter OTP sent to <strong>{{ email }}</strong>.</p>
      <div class="mb-3">
        <label class="form-label required">OTP</label>
        <input type="text" class="form-control" formControlName="otp" />
      </div>
      <div class="mb-3">
        <label class="form-label required">New Password</label>
        <div class="password-toggle">
          <input
            [type]="showNewPassword ? 'text' : 'password'"
            class="form-control"
            formControlName="newPassword"
          />
          <button
            type="button"
            class="password-toggle-btn"
            [class.is-active]="showNewPassword"
            (click)="showNewPassword = !showNewPassword"
            [attr.aria-label]="showNewPassword ? 'Hide password' : 'Show password'"
          >
            <svg class="password-toggle-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path class="icon-eye-off" d="M9.88 9.88a3 3 0 1 0 4.24 4.24" />
              <path class="icon-eye-off" d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68" />
              <path class="icon-eye-off" d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61" />
              <line class="icon-eye-off" x1="2" x2="22" y1="2" y2="22" />
              <path class="icon-eye-on" d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
              <circle class="icon-eye-on" cx="12" cy="12" r="3" />
            </svg>
          </button>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label required">Confirm Password</label>
        <div class="password-toggle">
          <input
            [type]="showConfirmPassword ? 'text' : 'password'"
            class="form-control"
            formControlName="confirmPassword"
          />
          <button
            type="button"
            class="password-toggle-btn"
            [class.is-active]="showConfirmPassword"
            (click)="showConfirmPassword = !showConfirmPassword"
            [attr.aria-label]="showConfirmPassword ? 'Hide password' : 'Show password'"
          >
            <svg class="password-toggle-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path class="icon-eye-off" d="M9.88 9.88a3 3 0 1 0 4.24 4.24" />
              <path class="icon-eye-off" d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68" />
              <path class="icon-eye-off" d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61" />
              <line class="icon-eye-off" x1="2" x2="22" y1="2" y2="22" />
              <path class="icon-eye-on" d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
              <circle class="icon-eye-on" cx="12" cy="12" r="3" />
            </svg>
          </button>
        </div>
      </div>
      <button class="pending-action-btn pending-check-btn neu-button w-100" [disabled]="loading">
        <ng-container *ngIf="loading; else embeddedResetLabel">
          <span class="span-mother" aria-hidden="true"><span>S</span><span>e</span><span>n</span><span>d</span><span>i</span><span>n</span><span>g</span><span>&nbsp;</span><span>O</span><span>T</span><span>P</span><span>.</span><span>.</span><span>.</span></span>
          <span class="span-mother2" aria-hidden="true"><span>S</span><span>e</span><span>n</span><span>d</span><span>i</span><span>n</span><span>g</span><span>&nbsp;</span><span>O</span><span>T</span><span>P</span><span>.</span><span>.</span><span>.</span></span>
          <span class="visually-hidden">Sending OTP...</span>
        </ng-container>
        <ng-template #embeddedResetLabel>
          <span class="span-mother" aria-hidden="true"><span>R</span><span>e</span><span>s</span><span>e</span><span>t</span><span>&nbsp;</span><span>P</span><span>a</span><span>s</span><span>s</span><span>w</span><span>o</span><span>r</span><span>d</span></span>
          <span class="span-mother2" aria-hidden="true"><span>R</span><span>e</span><span>s</span><span>e</span><span>t</span><span>&nbsp;</span><span>P</span><span>a</span><span>s</span><span>s</span><span>w</span><span>o</span><span>r</span><span>d</span></span>
          <span class="visually-hidden">Reset Password</span>
        </ng-template>
      </button>
      <div class="mt-3 text-center">
        <button
          type="button"
          class="btn btn-link p-0"
          (click)="resendOtp()"
          [disabled]="loading || resendCooldown > 0"
        >
          <ng-container *ngIf="resendCooldown > 0; else resendLabel">
            Resend OTP ({{ resendCooldown }}s)
          </ng-container>
          <ng-template #resendLabel>Resend OTP</ng-template>
        </button>
      </div>
    </form>
  </div>
</ng-container>

<ng-template #publicLayout>
  <div class="public-page-shell">
    <header class="d-flex align-items-center justify-content-center p-3" style="background-color: #000; color: white">
      <img src="/assets/logo.png" alt="Logo" class="public-header-logo" />
      <h1>Police Case Management</h1>
    </header>

    <div class="public-page-content forgot-password-page-content">
      <div class="container py-5">
        <div class="forgot-header-row mb-4">
          <a routerLink="/register" class="pending-action-btn pending-check-btn neu-button terms-back-btn">
            <span aria-hidden="true" class="span-mother">
              <span>B</span>
              <span>a</span>
              <span>c</span>
              <span>k</span>
              <span>&nbsp;</span>
              <span>t</span>
              <span>o</span>
              <span>&nbsp;</span>
              <span>r</span>
              <span>e</span>
              <span>g</span>
              <span>i</span>
              <span>s</span>
              <span>t</span>
              <span>r</span>
              <span>a</span>
              <span>t</span>
              <span>i</span>
              <span>o</span>
              <span>n</span>
            </span>
            <span aria-hidden="true" class="span-mother2">
              <span>B</span>
              <span>a</span>
              <span>c</span>
              <span>k</span>
              <span>&nbsp;</span>
              <span>t</span>
              <span>o</span>
              <span>&nbsp;</span>
              <span>r</span>
              <span>e</span>
              <span>g</span>
              <span>i</span>
              <span>s</span>
              <span>t</span>
              <span>r</span>
              <span>a</span>
              <span>t</span>
              <span>i</span>
              <span>o</span>
              <span>n</span>
            </span>
            <span class="visually-hidden">Back to registration</span>
          </a>
          <h2 class="text-center mb-0">Forgot Password</h2>
        </div>

        <div class="col-md-8 col-lg-6 mx-auto">
          <ng-container *ngTemplateOutlet="forgotCard"></ng-container>
        </div>
      </div>
    </div>

    <app-footer></app-footer>
  </div>
</ng-template>

<ng-template #forgotCard>
  <div class="card shadow">
    <div class="card-body p-4">
      <form *ngIf="step === 'request'" [formGroup]="requestForm" (ngSubmit)="sendOtp()">
        <div class="mb-3">
          <label class="form-label required">Email</label>
          <input type="email" class="form-control" formControlName="email" />
        </div>
        <button class="pending-action-btn pending-check-btn neu-button w-100" [disabled]="loading">
          <ng-container *ngIf="loading; else sendOtpLabel">
            <span class="span-mother" aria-hidden="true"><span>S</span><span>e</span><span>n</span><span>d</span><span>i</span><span>n</span><span>g</span><span>.</span><span>.</span><span>.</span></span>
            <span class="span-mother2" aria-hidden="true"><span>S</span><span>e</span><span>n</span><span>d</span><span>i</span><span>n</span><span>g</span><span>.</span><span>.</span><span>.</span></span>
            <span class="visually-hidden">Sending...</span>
          </ng-container>
          <ng-template #sendOtpLabel>
            <span class="span-mother" aria-hidden="true"><span>S</span><span>e</span><span>n</span><span>d</span><span>&nbsp;</span><span>O</span><span>T</span><span>P</span></span>
            <span class="span-mother2" aria-hidden="true"><span>S</span><span>e</span><span>n</span><span>d</span><span>&nbsp;</span><span>O</span><span>T</span><span>P</span></span>
            <span class="visually-hidden">Send OTP</span>
          </ng-template>
        </button>
      </form>

      <form *ngIf="step === 'verify'" [formGroup]="verifyForm" (ngSubmit)="verifyOtp()">
        <p class="mb-3">Enter OTP sent to <strong>{{ email }}</strong>.</p>
        <div class="mb-3">
          <label class="form-label required">OTP</label>
          <input type="text" class="form-control" formControlName="otp" />
        </div>
        <button class="pending-action-btn pending-check-btn neu-button w-100" [disabled]="loading">
          <ng-container *ngIf="loading; else verifyOtpLabel">
            <span class="span-mother" aria-hidden="true"><span>V</span><span>e</span><span>r</span><span>i</span><span>f</span><span>y</span><span>i</span><span>n</span><span>g</span><span>.</span><span>.</span><span>.</span></span>
            <span class="span-mother2" aria-hidden="true"><span>V</span><span>e</span><span>r</span><span>i</span><span>f</span><span>y</span><span>i</span><span>n</span><span>g</span><span>.</span><span>.</span><span>.</span></span>
            <span class="visually-hidden">Verifying...</span>
          </ng-container>
          <ng-template #verifyOtpLabel>
            <span class="span-mother" aria-hidden="true"><span>V</span><span>e</span><span>r</span><span>i</span><span>f</span><span>y</span><span>&nbsp;</span><span>O</span><span>T</span><span>P</span></span>
            <span class="span-mother2" aria-hidden="true"><span>V</span><span>e</span><span>r</span><span>i</span><span>f</span><span>y</span><span>&nbsp;</span><span>O</span><span>T</span><span>P</span></span>
            <span class="visually-hidden">Verify OTP</span>
          </ng-template>
        </button>
      </form>

      <form *ngIf="step === 'reset'" [formGroup]="resetForm" (ngSubmit)="resetPassword()">
        <div class="mb-3">
          <label class="form-label required">New Password</label>
          <div class="password-toggle">
            <input
              [type]="showNewPassword ? 'text' : 'password'"
              class="form-control"
              formControlName="newPassword"
            />
            <button
              type="button"
              class="password-toggle-btn"
              [class.is-active]="showNewPassword"
              (click)="showNewPassword = !showNewPassword"
              [attr.aria-label]="showNewPassword ? 'Hide password' : 'Show password'"
            >
              <svg class="password-toggle-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path class="icon-eye-off" d="M9.88 9.88a3 3 0 1 0 4.24 4.24" />
                <path class="icon-eye-off" d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68" />
                <path class="icon-eye-off" d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61" />
                <line class="icon-eye-off" x1="2" x2="22" y1="2" y2="22" />
                <path class="icon-eye-on" d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
                <circle class="icon-eye-on" cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label required">Confirm Password</label>
          <div class="password-toggle">
            <input
              [type]="showConfirmPassword ? 'text' : 'password'"
              class="form-control"
              formControlName="confirmPassword"
            />
            <button
              type="button"
              class="password-toggle-btn"
              [class.is-active]="showConfirmPassword"
              (click)="showConfirmPassword = !showConfirmPassword"
              [attr.aria-label]="showConfirmPassword ? 'Hide password' : 'Show password'"
            >
              <svg class="password-toggle-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path class="icon-eye-off" d="M9.88 9.88a3 3 0 1 0 4.24 4.24" />
                <path class="icon-eye-off" d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68" />
                <path class="icon-eye-off" d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61" />
                <line class="icon-eye-off" x1="2" x2="22" y1="2" y2="22" />
                <path class="icon-eye-on" d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
                <circle class="icon-eye-on" cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>
        <button class="pending-action-btn pending-check-btn neu-button w-100" [disabled]="loading">
          <ng-container *ngIf="loading; else resetPasswordLabel">
            <span class="span-mother" aria-hidden="true"><span>S</span><span>e</span><span>n</span><span>d</span><span>i</span><span>n</span><span>g</span><span>&nbsp;</span><span>O</span><span>T</span><span>P</span><span>.</span><span>.</span><span>.</span></span>
            <span class="span-mother2" aria-hidden="true"><span>S</span><span>e</span><span>n</span><span>d</span><span>i</span><span>n</span><span>g</span><span>&nbsp;</span><span>O</span><span>T</span><span>P</span><span>.</span><span>.</span><span>.</span></span>
            <span class="visually-hidden">Sending OTP...</span>
          </ng-container>
          <ng-template #resetPasswordLabel>
            <span class="span-mother" aria-hidden="true"><span>R</span><span>e</span><span>s</span><span>e</span><span>t</span><span>&nbsp;</span><span>P</span><span>a</span><span>s</span><span>s</span><span>w</span><span>o</span><span>r</span><span>d</span></span>
            <span class="span-mother2" aria-hidden="true"><span>R</span><span>e</span><span>s</span><span>e</span><span>t</span><span>&nbsp;</span><span>P</span><span>a</span><span>s</span><span>s</span><span>w</span><span>o</span><span>r</span><span>d</span></span>
            <span class="visually-hidden">Reset Password</span>
          </ng-template>
        </button>
      </form>

      <p *ngIf="!isEmbedded" class="mt-3 mb-0 text-center">
        <a routerLink="/login">Back to login</a>
      </p>
    </div>
  </div>
</ng-template>
